name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'kubernetes/**'
      - 'README.md'
      - 'setup_instructions.md'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/virtual-farming

jobs:

# ─────────────────────────────────────────────
# Job 1: Run Tests
# ─────────────────────────────────────────────
  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: backend
        run: npm test || echo "No backend tests"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test || echo "No frontend tests"

# ─────────────────────────────────────────────
# Job 2: Lint Frontend
# ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

# ─────────────────────────────────────────────
# Job 3: Build Frontend
# ─────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      image_tag: ${{ steps.set_output.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ./frontend/.next/
            ./frontend/public/

      - name: Set Image Tag
        id: set_output
        run: echo "image_tag=sha-${GITHUB_SHA}" >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────
# Job 4: Docker Build, Scan & Push
# ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    outputs:
      image_tag: ${{ needs.build.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

# ───────── BACKEND IMAGE ─────────

      - name: Extract Metadata for Backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/virtual-farming-backend
          tags: |
            type=sha
            type=ref,event=branch
            latest

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          load: true

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/virtual-farming-backend:sha-${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

# ───────── FRONTEND IMAGE ─────────

      - name: Extract Metadata for Frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/virtual-farming-frontend
          tags: |
            type=sha
            type=ref,event=branch
            latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          load: true

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/virtual-farming-frontend:sha-${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

# ─────────────────────────────────────────────
# Job 5: Deploy to Kubernetes
# ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

# ───────── Create Kubernetes Secrets ─────────

      - name: Create Kubernetes Secrets
        run: |
          kubectl create secret generic virtual-farming-secrets \
            --namespace virtual-farming \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --from-literal=OPENWEATHER_API_KEY="${{ secrets.OPENWEATHER_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

# ───────── Update Image Tags ─────────

      - name: Update Kubernetes Manifests
        run: |
          BACKEND_IMG="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/virtual-farming-backend:sha-${{ github.sha }}"
          FRONTEND_IMG="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/virtual-farming-frontend:sha-${{ github.sha }}"

          sed -i "s|image:.*farming-backend.*|image: ${BACKEND_IMG}|g" kubernetes/backend-deployment.yml
          sed -i "s|image:.*farming-frontend.*|image: ${FRONTEND_IMG}|g" kubernetes/frontend-deployment.yml

# ───────── Deploy to Kubernetes ─────────

      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f kubernetes/