# ─────────────────────────────────────────────────────────────────────────────
# K8s Secret — virtual-farming namespace
# ─────────────────────────────────────────────────────────────────────────────
# USAGE:
#   1. Base64-encode each value:
#        echo -n "your_actual_value" | base64
#   2. Replace the placeholder <base64-encoded-...> strings below with the
#      real encoded values.
#   3. Apply:
#        kubectl apply -f kubernetes/secrets.yml
#
# NOTE: Never commit real secrets to version control.
#       In CI/CD these are injected automatically via GitHub Secrets.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: virtual-farming-secrets
  namespace: virtual-farming
  labels:
    app.kubernetes.io/name: virtual-farming
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  MONGO_URI: "${MONGO_URI}"
  JWT_SECRET: "${JWT_SECRET}"
  GEMINI_API_KEY: "${GEMINI_API_KEY}"
  OPENWEATHER_API_KEY: "${OPENWEATHER_API_KEY}"
