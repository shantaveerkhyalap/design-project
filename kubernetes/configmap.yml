apiVersion: v1
kind: ConfigMap
metadata:
  name: virtual-farming-config
  namespace: virtual-farming
  labels:
    app.kubernetes.io/name: virtual-farming
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  PORT: "5000"
  # URL for the backend service as accessible within the cluster
  BACKEND_URL: "http://backend-service:5000"
  # URL for the frontend (used by backend CORS config if needed)
  FRONTEND_URL: "http://frontend-service:80"
