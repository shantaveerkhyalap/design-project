# ─────────────────────────────────────────────────────────────────────────────
# Backend — Deployment & ClusterIP Service
# Express.js API server (port 5000)
# ─────────────────────────────────────────────────────────────────────────────

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: virtual-farming
  labels:
    app: backend
    app.kubernetes.io/name: virtual-farming
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Graceful shutdown
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend
          # Image is updated automatically by the CI/CD pipeline
          image: ghcr.io/shantaveerkhyalap/virtual-farming-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http

          # ── Environment Variables ──────────────────────────────────────
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: virtual-farming-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: virtual-farming-config
                  key: PORT
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: virtual-farming-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: virtual-farming-secrets
                  key: JWT_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: virtual-farming-secrets
                  key: GEMINI_API_KEY
            - name: OPENWEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: virtual-farming-secrets
                  key: OPENWEATHER_API_KEY

          # ── Resource Limits ────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Health Probes ──────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      # Pull from GHCR using the auto-generated token
      imagePullSecrets:
        - name: ghcr-pull-secret

---

# ── Service (ClusterIP) ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: virtual-farming
  labels:
    app: backend
    app.kubernetes.io/name: virtual-farming
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
